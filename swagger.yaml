openapi: 3.0.0
info:
  title: BigBrain API
  version: 1.0.0

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    Question:
      type: object
      required: [question, options, Correct, timeNeeded]
      properties:
        question:
          type: string
        options:
          type: array
          items:
            type: string
        Correct:
          type: array
          items:
            type: integer
        timeNeeded:
          type: integer

    PublicQuestion:
      type: object
      required: [question, options, timeNeeded]
      properties:
        question:
          type: string
        options:
          type: array
          items:
            type: string
        timeNeeded:
          type: integer

    PublicQuestionReturn:
      allOf:
        - $ref: '#/components/schemas/PublicQuestion'
        - type: object
          required: [isoTimeLastQuestionStarted, lastQuestion]
          properties:
            isoTimeLastQuestionStarted:
              type: string
              nullable: true
            lastQuestion:
              type: boolean

    PlayerAnswer:
      type: object
      required: [questionStartedAt, answeredAt, answerIds, correct]
      properties:
        questionStartedAt:
          type: string
          nullable: true
        answeredAt:
          type: string
          nullable: true
        answerIds:
          type: array
          items:
            type: integer
        correct:
          type: boolean

    Player:
      type: object
      required: [name, answers]
      properties:
        name:
          type: string
        answers:
          type: array
          items:
            $ref: '#/components/schemas/PlayerAnswer'

    QuizListItem:
      type: object
      required:
        [
          id,
          name,
          owner,
          createdAt,
          thumbnail,
          active,
          oldSessions,
          numQuestions,
        ]
      properties:
        id:
          type: string
        name:
          type: string
        owner:
          type: string
        createdAt:
          type: string
        thumbnail:
          type: string
          nullable: true
        active:
          type: string
          nullable: true
        oldSessions:
          type: array
          items:
            type: string
        numQuestions:
          type: integer

    Quiz:
      type: object
      required:
        [name, owner, questions, thumbnail, active, oldSessions, createdAt]
      properties:
        name:
          type: string
        owner:
          type: string
        description:
          type: string
          nullable: true
        questions:
          type: array
          items:
            $ref: '#/components/schemas/Question'
        thumbnail:
          type: string
          nullable: true
        active:
          type: string
          nullable: true
        oldSessions:
          type: array
          items:
            type: string
        createdAt:
          type: string

    QuestionRow:
      type: object
      required:
        [
          id,
          quiz_id,
          question,
          options,
          correct,
          time_needed_ms,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
        quiz_id:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correct:
          type: array
          items:
            type: integer
        time_needed_ms:
          type: integer
        created_at:
          type: string
        updated_at:
          type: string

    SessionStatus:
      type: object
      required:
        [
          active,
          answerAvailable,
          isoTimeLastQuestionStarted,
          position,
          questions,
          players,
        ]
      properties:
        active:
          type: boolean
        answerAvailable:
          type: boolean
        isoTimeLastQuestionStarted:
          type: string
          nullable: true
        position:
          type: integer
        questions:
          type: array
          items:
            $ref: '#/components/schemas/Question'
        players:
          type: array
          items:
            type: string

security:
  - bearerAuth: []

paths:
  /api/admin/auth/register:
    post:
      summary: Register a new admin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                password:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '400':
          description: Invalid input (e.g. email already registered)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/auth/login:
    post:
      summary: Log in as admin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '400':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/auth/logout:
    post:
      summary: Log out admin
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/quiz:
    get:
      summary: Get all quizzes for the authenticated admin
      responses:
        '200':
          description: List of quizzes
          content:
            application/json:
              schema:
                type: object
                properties:
                  quizzes:
                    type: array
                    items:
                      $ref: '#/components/schemas/QuizListItem'
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create a new quiz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Quiz created
          content:
            application/json:
              schema:
                type: object
                properties:
                  quizId:
                    type: string
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/quiz/{quizId}:
    parameters:
      - name: quizId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get a specific quiz
      responses:
        '200':
          description: Quiz data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quiz'
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update a quiz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                thumbnail:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Quiz updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete a quiz
      responses:
        '200':
          description: Quiz deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/quiz/{quizId}/question:
    parameters:
      - name: quizId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get all questions for a quiz
      responses:
        '200':
          description: List of questions
          content:
            application/json:
              schema:
                type: object
                properties:
                  questions:
                    type: array
                    items:
                      $ref: '#/components/schemas/QuestionRow'
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Add one or more questions to a quiz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [questions]
              properties:
                questions:
                  type: array
                  items:
                    $ref: '#/components/schemas/Question'
      responses:
        '201':
          description: Questions created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ids:
                    type: array
                    items:
                      type: string
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/quiz/{quizId}/question/{questionId}:
    parameters:
      - name: quizId
        in: path
        required: true
        schema:
          type: string
      - name: questionId
        in: path
        required: true
        schema:
          type: string
    put:
      summary: Update a single question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                options:
                  type: array
                  items:
                    type: string
                correct:
                  type: array
                  items:
                    type: integer
                timeNeededMs:
                  type: integer
      responses:
        '200':
          description: Question updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete a single question
      responses:
        '200':
          description: Question deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/quiz/{quizId}/start:
    parameters:
      - name: quizId
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Start a quiz session
      responses:
        '200':
          description: Session started
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '400':
          description: Quiz already has active session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/quiz/{quizId}/advance:
    parameters:
      - name: quizId
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Advance quiz to next question
      responses:
        '200':
          description: Advanced to next stage
          content:
            application/json:
              schema:
                type: object
                properties:
                  stage:
                    type: integer
        '400':
          description: Invalid state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/quiz/{quizId}/end:
    parameters:
      - name: quizId
        in: path
        required: true
        schema:
          type: string
    post:
      summary: End a quiz session
      responses:
        '200':
          description: Session ended
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '400':
          description: No active session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/session/{sessionId}/status:
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get session status
      responses:
        '200':
          description: Session status
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    $ref: '#/components/schemas/SessionStatus'
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/session/{sessionId}/results:
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get session results (after session ends)
      responses:
        '200':
          description: Session results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Player'
        '400':
          description: Session still active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/play/join/{sessionId}:
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Join a game session as a player
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Joined successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  playerId:
                    type: integer
        '400':
          description: Invalid input or session already started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/play/{playerId}/status:
    parameters:
      - name: playerId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Check if the game has started
      security: []
      responses:
        '200':
          description: Game start status
          content:
            application/json:
              schema:
                type: object
                properties:
                  started:
                    type: boolean

  /api/play/{playerId}/question:
    parameters:
      - name: playerId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get the current question
      security: []
      responses:
        '200':
          description: Current question
          content:
            application/json:
              schema:
                type: object
                properties:
                  question:
                    $ref: '#/components/schemas/PublicQuestionReturn'
        '400':
          description: Session not started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/play/{playerId}/answer:
    parameters:
      - name: playerId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get correct answers for current question (after time expires)
      security: []
      responses:
        '200':
          description: Correct answer IDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  answerIds:
                    type: array
                    items:
                      type: integer
        '400':
          description: Answers not yet available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Submit answers for current question
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answerIds]
              properties:
                answerIds:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Answers submitted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
        '400':
          description: Invalid submission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/play/{playerId}/results:
    parameters:
      - name: playerId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get player results after session ends
      security: []
      responses:
        '200':
          description: Player answers/results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlayerAnswer'
        '400':
          description: Session still active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
